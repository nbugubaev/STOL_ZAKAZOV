<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Кабинет мастера</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #111827);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --border: var(--tg-theme-section-separator-color, #e5e7eb);
      --field: var(--tg-theme-secondary-bg-color, #f3f4f6);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btnText: var(--tg-theme-button-text-color, #ffffff);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 16px; }
    h2 { margin: 0 0 4px; font-size: 20px; }
    h3 { margin: 18px 0 8px; font-size: 15px; color: var(--hint); }
    .sub { color: var(--hint); font-size: 13px; margin: 0 0 16px; }
    label { display: block; margin-bottom: 12px; font-size: 13px; color: var(--hint); }
    input { width: 100%; padding: 11px; margin-top: 5px; border-radius: 10px; border: 1px solid var(--border); background: var(--field); color: var(--text); font-size: 16px; outline: none; font-family: inherit; }
    .card { background: var(--field); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .card .t { font-weight: 500; margin-bottom: 4px; }
    .card .meta { font-size: 13px; color: var(--hint); line-height: 1.6; }
    .btn { width: 100%; padding: 13px; border-radius: 10px; border: none; background: var(--btn); color: var(--btnText); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }
    .btn.sec { background: transparent; color: var(--btn); border: 1px solid var(--btn); }
    .profile { background: var(--field); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .err { color: #dc2626; font-size: 13px; margin: 8px 0; }
    .empty { color: var(--hint); font-size: 13px; padding: 6px 0; }
  </style>
</head>
<body>
  <div id="app"><p class="sub">Загрузка…</p></div>
  <script>
    var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    var initData = tg ? tg.initData : '';
    if (tg) { tg.ready(); tg.expand(); }
    var app = document.getElementById('app');

    async function api(action, extra) {
      var res = await fetch('/api/master', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action, init_data: initData }, extra || {})),
      });
      if (!res.ok) throw new Error('Ошибка сервера (' + res.status + ')');
      return res.json();
    }

    function el(html) { var d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstChild; }
    function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }

    function ticketCard(t, kind) {
      var m = t.metadata || {};
      var meta = '';
      if (m.name) meta += 'Клиент: ' + esc(m.name) + '<br>';
      if (m.phone) meta += '📞 ' + esc(m.phone) + '<br>';
      if (m.address) meta += '📍 ' + esc(m.address) + '<br>';
      if (m.urgency) meta += 'Срочность: ' + esc(m.urgency) + '<br>';
      var no = t.ticket_no ? ('№' + String(t.ticket_no).padStart(4, '0') + ' · ') : '';
      var card = el('<div class="card"><div class="t">' + no + esc(m.description || 'Без описания') + '</div><div class="meta">' + meta + '</div></div>');
      if (kind === 'pool') {
        var b = el('<button class="btn">Взять заказ</button>');
        b.onclick = function () { doAction('take', t.id, b); };
        card.appendChild(b);
      } else if (kind === 'active') {
        var b2 = el('<button class="btn">Выполнено</button>');
        b2.onclick = function () { doAction('complete', t.id, b2); };
        card.appendChild(b2);
        var b3 = el('<button class="btn sec">Отклонить</button>');
        b3.onclick = function () { if (confirm('Отклонить заявку? Она вернётся модератору.')) doAction('reject', t.id, b3); };
        card.appendChild(b3);
      }
      return card;
    }

    async function doAction(action, ticketId, btn) {
      if (btn) { btn.disabled = true; btn.textContent = '…'; }
      try { renderCabinet(await api(action, { ticket_id: ticketId })); }
      catch (e) { alert(e.message); if (btn) btn.disabled = false; }
    }

    function section(title, list, kind, emptyText) {
      app.appendChild(el('<h3>' + title + '</h3>'));
      if (!list || list.length === 0) { app.appendChild(el('<div class="empty">' + emptyText + '</div>')); return; }
      list.forEach(function (t) { app.appendChild(ticketCard(t, kind)); });
    }

    function renderCabinet(data) {
      app.innerHTML = '';
      var p = data.profile || {};
      app.appendChild(el('<h2>Кабинет мастера</h2>'));
      app.appendChild(el('<div class="profile"><div class="t">' + esc(p.name || '') + '</div><div class="meta">'
        + (p.specialization ? esc(p.specialization) + '<br>' : '')
        + (p.phone ? '📞 ' + esc(p.phone) : '') + '</div></div>'));
      var refresh = el('<button class="btn sec">Обновить</button>');
      refresh.onclick = load;
      app.appendChild(refresh);
      section('Доступные заказы', data.pool, 'pool', 'Свободных заказов нет.');
      section('Мои активные', data.active, 'active', 'Активных заказов нет.');
      section('Выполненные', data.done, 'done', 'Пока ничего.');
    }

    function renderRegister() {
      app.innerHTML = '';
      app.appendChild(el('<h2>Регистрация мастера</h2>'));
      app.appendChild(el('<p class="sub">Заполните данные, чтобы получать заказы.</p>'));
      var form = el('<div></div>');
      form.innerHTML =
        '<label>Имя *<input id="r_name"></label>' +
        '<label>Телефон *<input id="r_phone" type="tel"></label>' +
        '<label>Специализация<input id="r_spec" placeholder="например, сантехник"></label>' +
        '<p class="err" id="r_err" style="display:none"></p>';
      app.appendChild(form);
      var b = el('<button class="btn">Зарегистрироваться</button>');
      b.onclick = async function () {
        var name = document.getElementById('r_name').value.trim();
        var phone = document.getElementById('r_phone').value.trim();
        var spec = document.getElementById('r_spec').value.trim();
        var err = document.getElementById('r_err');
        if (!name || !phone) { err.textContent = 'Заполните имя и телефон.'; err.style.display = 'block'; return; }
        err.style.display = 'none'; b.disabled = true; b.textContent = '…';
        try {
          renderCabinet(await api('register', { name: name, phone: phone, specialization: spec }));
        } catch (e) {
          err.textContent = 'Не удалось зарегистрироваться. Попробуйте ещё раз.';
          err.style.display = 'block'; b.disabled = false; b.textContent = 'Зарегистрироваться';
        }
      };
      app.appendChild(b);
    }

    async function load() {
      app.innerHTML = '<p class="sub">Загрузка…</p>';
      if (!initData) { app.innerHTML = '<p class="err">Откройте кабинет через бота в Telegram.</p>'; return; }
      try {
        var data = await api('load');
        if (data.registered) renderCabinet(data); else renderRegister();
      } catch (e) { app.innerHTML = '<p class="err">' + esc(e.message) + '</p>'; }
    }
    load();
  </script>
</body>
</html>
