<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Мои данные</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #111827);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --border: var(--tg-theme-section-separator-color, #e5e7eb);
      --field: var(--tg-theme-secondary-bg-color, #f3f4f6);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 20px; }
    h2 { margin: 0 0 6px; }
    p.sub { margin: 0 0 20px; color: var(--hint); font-size: 14px; }
    label { display: block; margin-bottom: 14px; font-size: 14px; color: var(--hint); }
    input { width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px; border: 1px solid var(--border); background: var(--field); color: var(--text); font-size: 16px; outline: none; font-family: inherit; }
    .ok { color: #059669; font-size: 14px; margin: 0 0 14px; }
    .error { color: #dc2626; font-size: 14px; margin: 0 0 14px; }
    button.submit { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--btn); color: var(--btn-text); font-size: 16px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Мои данные</h2>
  <p class="sub">Эти данные подставятся в новую заявку. Можно изменить в любой момент.</p>

  <div id="form" style="display:none;">
    <label>Компания / Имя *
      <input id="name" placeholder="Название компании или ваше имя" />
    </label>
    <label>Телефон *
      <input id="phone" type="tel" placeholder="+7 ..." />
    </label>
    <label>Адрес
      <input id="address" placeholder="Улица, дом, квартира" />
    </label>
    <p class="ok" id="ok" style="display:none;">Сохранено ✓</p>
    <p class="error" id="error" style="display:none;"></p>
    <button class="submit" id="saveBtn">Сохранить</button>
  </div>

  <p class="sub" id="loading">Загрузка…</p>

  <script>
    var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    var inTelegram = !!(tg && tg.initData !== undefined);
    if (inTelegram) { tg.ready(); tg.expand(); }

    function show(id, on) { document.getElementById(id).style.display = on ? 'block' : 'none'; }
    function msg(kind, text) {
      show('ok', kind === 'ok'); show('error', kind === 'error');
      if (kind === 'error') document.getElementById('error').textContent = text || '';
    }

    async function api(action, extra) {
      var res = await fetch('/api/client', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.assign({ action: action, init_data: tg ? tg.initData : '' }, extra || {}))
      });
      if (!res.ok) throw new Error('Ошибка сервера (' + res.status + ')');
      return res.json();
    }

    function fill(p) {
      if (!p) return;
      if (p.name) document.getElementById('name').value = p.name;
      if (p.phone) document.getElementById('phone').value = p.phone;
      if (p.address) document.getElementById('address').value = p.address;
    }

    async function save() {
      var name = document.getElementById('name').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var address = document.getElementById('address').value.trim();
      if (!name || !phone) { msg('error', 'Заполните Компания / Имя и телефон.'); return; }
      msg(null); var b = document.getElementById('saveBtn'); b.disabled = true; b.textContent = '…';
      try {
        await api('save', { name: name, phone: phone, address: address });
        msg('ok'); b.textContent = 'Сохранить'; b.disabled = false;
      } catch (e) {
        msg('error', 'Не удалось сохранить. Попробуйте ещё раз.');
        b.textContent = 'Сохранить'; b.disabled = false;
      }
    }

    async function init() {
      if (!inTelegram || !tg.initData) {
        document.getElementById('loading').textContent = 'Откройте эту страницу через бота в Telegram.';
        return;
      }
      try {
        var data = await api('load');
        fill(data.profile);
      } catch (e) { /* профиль ещё пуст — это нормально */ }
      show('loading', false); show('form', true);
      document.getElementById('saveBtn').addEventListener('click', save);
    }
    init();
  </script>
</body>
</html>
