<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Новая заявка</title>
  <!-- Официальный SDK Telegram Mini Apps -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #111827);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --border: var(--tg-theme-section-separator-color, #e5e7eb);
      --field: var(--tg-theme-secondary-bg-color, #f3f4f6);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      padding: 20px;
    }
    h2 { margin: 0 0 6px; }
    p.sub { margin: 0 0 20px; color: var(--hint); font-size: 14px; }
    label { display: block; margin-bottom: 14px; font-size: 14px; color: var(--hint); }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--field);
      color: var(--text);
      font-size: 16px; /* 16px, чтобы iOS не зумил поле при фокусе */
      outline: none;
      font-family: inherit;
    }
    textarea { min-height: 90px; resize: vertical; }
    .error { color: #dc2626; font-size: 14px; margin: 0 0 14px; }
    button.submit {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--btn);
      color: var(--btn-text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Новая заявка</h2>
  <p class="sub">Заполните поля — мы передадим заявку модератору.</p>

  <label>Имя *
    <input id="name" placeholder="Как к вам обращаться" />
  </label>
  <label>Телефон *
    <input id="phone" type="tel" placeholder="+7 ..." />
  </label>
  <label>Адрес
    <input id="address" placeholder="Улица, дом, квартира" />
  </label>
  <label>Срочность
    <select id="urgency">
      <option>Обычная</option>
      <option>Срочная</option>
    </select>
  </label>
  <label>Описание проблемы *
    <textarea id="description" placeholder="Опишите, что случилось"></textarea>
  </label>

  <p class="error" id="error" style="display:none;"></p>
  <button class="submit" id="submitBtn" style="display:none;">Отправить заявку</button>

  <script>
    var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    var inTelegram = !!(tg && tg.initData !== undefined);

    function collect() {
      return {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim(),
        urgency: document.getElementById('urgency').value,
        description: document.getElementById('description').value.trim()
      };
    }

    function showError(msg) {
      var el = document.getElementById('error');
      el.textContent = msg || '';
      el.style.display = msg ? 'block' : 'none';
    }

    function submit() {
      var f = collect();
      if (!f.name || !f.phone || !f.description) {
        showError('Заполните имя, телефон и описание проблемы.');
        return;
      }
      showError('');
      var payload = JSON.stringify(f);
      if (tg && tg.sendData) {
        tg.sendData(payload); // отправит данные боту и закроет окно
      } else {
        alert('Форма работает внутри Telegram.\n\nСобранные данные:\n' + payload);
      }
    }

    if (inTelegram) {
      tg.ready();
      tg.expand();
      tg.MainButton.setText('Отправить заявку');
      tg.MainButton.show();
      tg.MainButton.onClick(submit);
    } else {
      // Открыто вне Telegram — показываем обычную кнопку
      var btn = document.getElementById('submitBtn');
      btn.style.display = 'block';
      btn.addEventListener('click', submit);
    }
  </script>
</body>
</html>
