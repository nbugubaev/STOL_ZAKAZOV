<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Новая заявка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #111827);
      --hint: var(--tg-theme-hint-color, #6b7280);
      --border: var(--tg-theme-section-separator-color, #e5e7eb);
      --field: var(--tg-theme-secondary-bg-color, #f3f4f6);
      --btn: var(--tg-theme-button-color, #2563eb);
      --btn-text: var(--tg-theme-button-text-color, #ffffff);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; padding: 20px; }
    h2 { margin: 0 0 6px; }
    p.sub { margin: 0 0 20px; color: var(--hint); font-size: 14px; }
    label { display: block; margin-bottom: 14px; font-size: 14px; color: var(--hint); }
    input, select, textarea {
      width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--field); color: var(--text);
      font-size: 16px; outline: none; font-family: inherit;
    }
    input[type="file"] { padding: 8px; }
    textarea { min-height: 90px; resize: vertical; }
    .notice { font-size: 12px; color: var(--hint); margin: 0 0 14px; line-height: 1.5; }
    .error { color: #dc2626; font-size: 14px; margin: 0 0 14px; }
    button.submit {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: var(--btn); color: var(--btn-text); font-size: 16px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Новая заявка</h2>
  <p class="sub">Заполните поля — мы передадим заявку модератору.</p>

  <label>Компания / Имя *
    <input id="name" placeholder="Название компании или ваше имя" />
  </label>
  <label>Телефон *
    <input id="phone" type="tel" placeholder="+7 ..." />
  </label>
  <label>Адрес
    <input id="address" placeholder="Улица, дом, квартира" />
  </label>
  <label>Срочность
    <select id="urgency">
      <option>Обычная</option>
      <option>Срочная</option>
    </select>
  </label>
  <label>Описание проблемы *
    <textarea id="description" placeholder="Опишите, что случилось"></textarea>
  </label>
  <label>Фото (необязательно)
    <input id="photo" type="file" accept="image/*" />
  </label>

  <p class="notice">Создавая заявку, вы соглашаетесь с условиями сервиса (диагностика, ремонт, гарантия). Подробнее — кнопка «ℹ️ Как мы работаем» в боте.</p>

  <p class="error" id="error" style="display:none;"></p>
  <button class="submit" id="submitBtn" style="display:none;">Отправить заявку</button>

  <script>
    // ===== НАСТРОЙКА: подставь свои значения из Supabase (Settings -> API) =====
    var SUPABASE_URL = "https://ВАШ-ПРОЕКТ.supabase.co";
    var SUPABASE_ANON_KEY = "ВАШ_ANON_KEY";
    // ========================================================================

    var tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
    var inTelegram = !!(tg && tg.initData !== undefined);

    function showError(msg) {
      var el = document.getElementById('error');
      el.textContent = msg || '';
      el.style.display = msg ? 'block' : 'none';
    }

    async function uploadPhoto(file) {
      if (SUPABASE_URL.indexOf('ВАШ') !== -1 || SUPABASE_ANON_KEY.indexOf('ВАШ') !== -1) {
        throw new Error('Supabase не настроен в форме (ключи не вписаны)');
      }
      var ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      var path = 'ticket_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
      var res = await fetch(SUPABASE_URL + '/storage/v1/object/attachments/' + path, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Content-Type': file.type || 'application/octet-stream'
        },
        body: file
      });
      if (!res.ok) {
        var t = await res.text().catch(function () { return ''; });
        throw new Error('storage ' + res.status + ' ' + t.slice(0, 150));
      }
      return SUPABASE_URL + '/storage/v1/object/public/attachments/' + path;
    }

    async function submit() {
      var f = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim(),
        urgency: document.getElementById('urgency').value,
        description: document.getElementById('description').value.trim()
      };
      if (!f.name || !f.phone || !f.description) {
        showError('Заполните «Компания / Имя», телефон и описание проблемы.'); return;
      }
      showError('');
      if (inTelegram && tg.MainButton) tg.MainButton.showProgress();

      try {
        var photoInput = document.getElementById('photo');
        if (photoInput.files && photoInput.files[0]) {
          f.photo_url = await uploadPhoto(photoInput.files[0]);
        }
      } catch (e) {
        console.error('Ошибка загрузки фото:', e);
        if (inTelegram && tg.MainButton) tg.MainButton.hideProgress();
        var goWithout = confirm('Не удалось загрузить фото. Отправить заявку без фото?');
        if (!goWithout) { showError('Отправка отменена. Попробуйте ещё раз.'); return; }
        delete f.photo_url;
        if (inTelegram && tg.MainButton) tg.MainButton.showProgress();
      }

      var payload = JSON.stringify(f);
      if (tg && tg.sendData) {
        tg.sendData(payload);
      } else {
        alert('Форма работает внутри Telegram.\n\nДанные:\n' + payload);
      }
    }

    async function loadProfile() {
      if (!inTelegram || !tg.initData) return;
      try {
        var res = await fetch('/api/client', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'load', init_data: tg.initData })
        });
        if (!res.ok) return;
        var data = await res.json();
        var p = data.profile;
        if (p) {
          if (p.name) document.getElementById('name').value = p.name;
          if (p.phone) document.getElementById('phone').value = p.phone;
          if (p.address) document.getElementById('address').value = p.address;
        }
      } catch (e) { console.error('profile load error', e); }
    }

    function getParam(k) { try { return new URLSearchParams(window.location.search).get(k) || ''; } catch (e) { return ''; } }

    function prefillFromParams() {
      var pn = getParam('name'), pp = getParam('phone'), pa = getParam('address');
      if (pn) document.getElementById('name').value = pn;
      if (pp) document.getElementById('phone').value = pp;
      if (pa) document.getElementById('address').value = pa;
      return !!(pn || pp || pa);
    }

    if (inTelegram) {
      tg.ready(); tg.expand();
      tg.MainButton.setText('Отправить заявку');
      tg.MainButton.show();
      tg.MainButton.onClick(submit);
      if (!prefillFromParams()) loadProfile();
    } else {
      prefillFromParams();
      var btn = document.getElementById('submitBtn');
      btn.style.display = 'block';
      btn.addEventListener('click', submit);
    }
  </script>
</body>
</html>
